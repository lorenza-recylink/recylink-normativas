// ─── Llamada a la API (proxy seguro) ────────────────────────────────────────
async function callClaude(body) {
  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error("HTTP " + res.status);
  return res.json();
}

// ─── Componentes base ────────────────────────────────────────────────────────
function Pill({ label, cfg }) {
  return <span style={{ fontSize:10.5, fontWeight:500, padding:"2px 9px", borderRadius:20, background:cfg?.bg||"#F1F5F9", color:cfg?.color||"#475569", whiteSpace:"nowrap" }}>{label}</span>;

function RespuestaBox({ texto, color, titulo }) {

    <div style={{ marginBottom:10, borderRadius:12, overflow:"hidden", border:`0.5px solid ${color}` }}>
      <div style={{ background:color, padding:"7px 13px", display:"flex", alignItems:"center", gap:7 }}>
        <span>💬</span>
        <span style={{ fontSize:12, fontWeight:600, color:"#fff" }}>{titulo}</span>
      </div>
      <div style={{ padding:"11px 14px", background:color===RL.green?RL.greenPale:RL.bluePale, fontSize:13, color:color===RL.green?RL.greenDark:RL.blue, lineHeight:1.7 }}>
        {texto}
      </div>
    </div>
  );
}

// ─── Búsqueda web ────────────────────────────────────────────────────────────
function BusquedaWeb({ pregunta, onDocsChange }) {
  const [estado, setEstado] = useState("pregunta");
  const [respuesta, setRespuesta] = useState("");
  const [resumen, setResumen] = useState("");
  const [docs, setDocs] = useState([]);
  const [expandidos, setExpandidos] = useState({});
  const [sel, setSel] = useState([]);

  const toggle = id => setSel(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const toggleExp = id => setExpandidos(p=>({...p,[id]:!p[id]}));

  function actualizarDocs(nuevos) { setDocs(nuevos); onDocsChange&&onDocsChange(nuevos); }

  async function ejecutar() {
    setEstado("cargando");
    try {
      const data = await callClaude({
        model:"claude-sonnet-4-6", max_tokens:2000,
        messages:[{ role:"user", content:
`Eres experto en normativas ambientales y gestión de residuos en Chile y Latinoamérica.
Un usuario de Recylink tiene este caso: "${pregunta}"
1. Responde directamente en 3-5 líneas desde el punto de vista legal/normativo.
2. Identifica el marco legal completo: leyes, decretos, reglamentos Y plataformas oficiales (SINADER, RETC, SNS, MMA, etc.).
3. Para cada ítem indica qué parte aplica exactamente al caso.
SOLO JSON sin backticks:
{"respuesta":"...","resumen":"...","items":[{"id":"i1","titulo":"nombre oficial","tipo":"Marco Legal|Decreto|Reglamento|Plataforma|Portal Oficial|Norma Nacional","estado":"Vigente|En tramitación|Derogado","fecha":"año","resumenContextual":"2-3 líneas","paginas":["artículo clave"],"link":"URL oficial real","leyes":[{"nombre":"nombre","link":"URL"}]}]}`
        }]
      });
      const txt = (data.content||[]).find(b=>b.type==="text")?.text||"";
      const parsed = JSON.parse(txt.replace(/```json|```/g,"").trim());
      setRespuesta(parsed.respuesta||"");
      setResumen(parsed.resumen||"");
      actualizarDocs((parsed.items||[]).map((r,i)=>({...r,id:"w"+i,fuente:"Web"})));
      setEstado("listo");
    } catch(e) { setEstado("error"); }
  }

  if (estado==="pregunta") return (
    <div style={{ border:`1px solid ${RL.blueMid}`, borderRadius:12, padding:"12px 14px", marginBottom:12, background:RL.bluePale, display:"flex", alignItems:"center", justifyContent:"space-between", gap:10, flexWrap:"wrap" }}>
      <div>
        <p style={{ margin:0, fontSize:13, fontWeight:600, color:RL.blue }}>¿Busco normativas en internet?</p>
        <p style={{ margin:"2px 0 0", fontSize:11.5, color:RL.blue, opacity:0.8 }}>Claude buscará el marco legal completo y portales oficiales.</p>
      </div>
      <div style={{ display:"flex", gap:6 }}>
        <button onClick={()=>setEstado("omitido")} style={{ fontSize:12, padding:"5px 12px", borderRadius:20, background:"transparent", color:RL.blue, border:`0.5px solid ${RL.blue}` }}>No por ahora</button>
        <button onClick={ejecutar} style={{ fontSize:12, fontWeight:600, background:RL.blue, color:"#fff", border:"none", borderRadius:20, padding:"5px 14px" }}>Sí, buscar →</button>
      </div>
    </div>
  );
  if (estado==="omitido") return null;
  if (estado==="cargando") return <div style={{ textAlign:"center", padding:14, color:"#6b7280", fontSize:12.5, marginBottom:12, background:"#f3f4f6", borderRadius:12 }}>Buscando normativas en fuentes oficiales...</div>;
  if (estado==="error") return (
    <div style={{ padding:"12px 14px", background:"#FFEAEA", borderRadius:12, fontSize:12.5, color:"#991B1B", marginBottom:12, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
      <span>No se pudo conectar. Intenta de nuevo.</span>
      <button onClick={ejecutar} style={{ fontSize:12, fontWeight:600, background:"#991B1B", color:"#fff", border:"none", borderRadius:20, padding:"5px 14px" }}>Reintentar</button>
    </div>
  );
  return (
    <div style={{ marginBottom:10 }}>
      <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:8 }}>
        <div style={{ width:3, height:12, background:RL.blue, borderRadius:2 }}></div>
        <span style={{ fontSize:11.5, fontWeight:600 }}>Marco legal y plataformas</span>
        <span style={{ fontSize:11, color:"#6b7280" }}>{docs.length} resultado{docs.length>1?"s":""}</span>
      </div>
      <RespuestaBox texto={respuesta} color={RL.blue} titulo="Respuesta basada en el marco legal" />
      {resumen && <div style={{ marginBottom:10, padding:"9px 12px", background:RL.bluePale, borderLeft:`3px solid ${RL.blue}`, borderRadius:"0 10px 10px 0", fontSize:12, color:RL.blue, lineHeight:1.6 }}>{resumen}</div>}
      {docs.map(doc=><Card key={doc.id} doc={doc} sel={sel.includes(doc.id)} onToggle={()=>toggle(doc.id)} expanded={!!expandidos[doc.id]} onExpand={()=>toggleExp(doc.id)} resumenContextual={doc.resumenContextual} />)}
    </div>
  );
}

// ─── Chat refinamiento ───────────────────────────────────────────────────────
function ChatRefinamiento({ sesion, docsWeb }) {
  const [mensajes, setMensajes] = useState([]);
  const [input, setInput] = useState("");
  const [cargando, setCargando] = useState(false);
  const [abierto, setAbierto] = useState(false);
  const bottomRef = useRef(null);

  async function enviar() {
    if (!input.trim()||cargando) return;
    const userMsg = { rol:"user", texto:input };
    const hist = [...mensajes, userMsg];
    setMensajes(hist); setInput(""); setCargando(true);
    try {
      const data = await callClaude({
        model:"claude-sonnet-4-6", max_tokens:600,
        system:`Eres experto en normativas de Recylink. Caso: "${sesion.pregunta}". Docs internos: ${sesion.docs.map(d=>d.titulo).join(", ")||"ninguno"}. Normativas web: ${docsWeb.map(d=>d.titulo).join(", ")||"ninguna"}. Responde en 3-5 líneas, concreto.`,
        messages: hist.map(m=>({ role:m.rol==="user"?"user":"assistant", content:m.texto }))
      });
      const resp = data.content?.find(b=>b.type==="text")?.text||"Sin respuesta.";
      setMensajes(p=>[...p,{rol:"assistant",texto:resp}]);
    } catch { setMensajes(p=>[...p,{rol:"assistant",texto:"Error. Intenta nuevamente."}]); }
    setCargando(false);
    setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:"smooth"}),150);
  }

  return (
    <div style={{ marginBottom:12 }}>
      <button onClick={()=>setAbierto(!abierto)} style={{ width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"9px 14px", background:abierto?"#f3f4f6":"#fff", border:"0.5px solid #e5e7eb", borderRadius:abierto?"12px 12px 0 0":12 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span>💬</span>
          <span style={{ fontSize:12.5, fontWeight:500 }}>¿El resultado no es lo que buscabas? Afínalo aquí</span>
        </div>
        <span style={{ fontSize:11, color:"#9ca3af" }}>{abierto?"▲":"▼"}</span>
      </button>
      {abierto && (
        <div style={{ border:"0.5px solid #e5e7eb", borderTop:"none", borderRadius:"0 0 12px 12px", overflow:"hidden" }}>
          <div style={{ maxHeight:240, overflowY:"auto", padding:"12px 14px", display:"flex", flexDirection:"column", gap:8, background:"#fff" }}>
            {mensajes.length===0 && <p style={{ fontSize:12, color:"#9ca3af", textAlign:"center", padding:"8px 0" }}>Cuéntame qué quieres precisar...</p>}
            {mensajes.map((m,i)=>(
              <div key={i} style={{ display:"flex", justifyContent:m.rol==="user"?"flex-end":"flex-start" }}>
                <div style={{ maxWidth:"85%", padding:"8px 12px", borderRadius:m.rol==="user"?"12px 12px 0 12px":"12px 12px 12px 0", background:m.rol==="user"?RL.green:"#f3f4f6", color:m.rol==="user"?"#fff":"#111", fontSize:12.5, lineHeight:1.6 }}>
                  {m.texto}
                </div>
              </div>
            ))}
            {cargando && <div style={{ display:"flex" }}><div style={{ padding:"8px 12px", borderRadius:"12px 12px 12px 0", background:"#f3f4f6", fontSize:12, color:"#9ca3af" }}>Buscando...</div></div>}
            <div ref={bottomRef} />
          </div>
          <div style={{ display:"flex", gap:6, padding:"10px 12px", borderTop:"0.5px solid #e5e7eb", background:"#f9fafb" }}>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&enviar()} placeholder="Ej: busca algo más específico sobre..." style={{ flex:1, borderRadius:20, padding:"6px 12px", fontSize:12.5 }} />
            <button onClick={enviar} disabled={cargando||!input.trim()} style={{ fontSize:12, fontWeight:600, background:input.trim()?RL.green:"#e5e7eb", color:input.trim()?"#fff":"#9ca3af", border:"none", borderRadius:20, padding:"6px 16px", whiteSpace:"nowrap" }}>
              Enviar →
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Sesión de búsqueda ──────────────────────────────────────────────────────
function SesionBusqueda({ sesion }) {
  const [sel, setSel] = useState([]);
  const [expandidos, setExpandidos] = useState({});
  const [analisisTexto, setAnalisisTexto] = useState("");
  const [analisisLoading, setAnalisisLoading] = useState(false);
  const [analisisResultado, setAnalisisResultado] = useState("");
  const [modo, setModo] = useState("analisis");
  const [copiado, setCopiado] = useState(false);
  const [docsWeb, setDocsWeb] = useState([]);
  const analisisRef = useRef(null);

  const toggle = id => setSel(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const toggleExp = id => setExpandidos(p=>({...p,[id]:!p[id]}));

  async function ejecutarAnalisis() {
    if(sel.length===0||!analisisTexto.trim()) return;
    setAnalisisLoading(true); setAnalisisResultado("");
    const docs=sesion.docs.filter(r=>sel.includes(r.id));
    const lista=docs.map(d=>`- [${d.fuente}] ${d.titulo}: ${d.resumen}`).join("\n");
    try {
      const data = await callClaude({
        model:"claude-sonnet-4-6", max_tokens:1000,
        messages:[{ role:"user", content:`Eres experto en normativas de Recylink Chile.\nCaso: "${sesion.pregunta}"\nDocumentos:\n${lista}\nSolicitud: "${analisisTexto}"\nModo: ${modo==="analisis"?"análisis profundo con puntos clave, alertas y contradicciones":"resumen ejecutivo"}.\nEspañol, claro. Máx 400 palabras.` }]
      });
      setAnalisisResultado(data.content?.find(b=>b.type==="text")?.text||"Error.");
    } catch { setAnalisisResultado("Error. Intenta nuevamente."); }
    setAnalisisLoading(false);
    setTimeout(()=>analisisRef.current?.scrollIntoView({behavior:"smooth"}),200);
  }

  function copiar(){navigator.clipboard.writeText(analisisResultado).then(()=>{setCopiado(true);setTimeout(()=>setCopiado(false),2000)});}
  function exportar(){
    const blob=new Blob([`ANÁLISIS RECYLINK\n${"=".repeat(40)}\nCaso: ${sesion.pregunta}\n\n${analisisResultado}`],{type:"text/plain"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="analisis-recylink.txt"; a.click();
  }

  return (
    <div style={{ marginBottom:20, borderRadius:14, border:"0.5px solid #e5e7eb", overflow:"hidden" }}>
      <div style={{ background:`linear-gradient(135deg, ${RL.greenPale}, ${RL.bluePale})`, padding:"12px 16px", borderBottom:"0.5px solid #e5e7eb" }}>
        <div style={{ display:"flex", alignItems:"flex-start", gap:8 }}>
          <span style={{ color:RL.greenDark, fontSize:13, marginTop:1 }}>🔍</span>
          <span style={{ fontSize:13.5, fontWeight:600, color:RL.greenDark, lineHeight:1.4 }}>{sesion.pregunta}</span>
        </div>
        {sesion.resumenBusqueda && <div style={{ marginTop:8, padding:"8px 10px", background:"rgba(255,255,255,0.6)", borderRadius:8, fontSize:12, color:RL.greenDark, lineHeight:1.6 }}>{sesion.resumenBusqueda}</div>}
      </div>

      <div style={{ padding:"14px 14px 0" }}>
        {sesion.respuestaDirecta && <RespuestaBox texto={sesion.respuestaDirecta} color={RL.green} titulo="Respuesta desde el repositorio Recylink" />}

        {sesion.docs.length>0 ? (
          <div style={{ marginBottom:10 }}>
            <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:8 }}>
              <div style={{ width:3, height:12, background:RL.green, borderRadius:2 }}></div>
              <span style={{ fontSize:11.5, fontWeight:600 }}>Repositorio Recylink</span>
              <span style={{ fontSize:11, color:"#6b7280" }}>{sesion.docs.length} coincidencia{sesion.docs.length>1?"s":""}</span>
              {sel.length>0&&<span style={{ marginLeft:"auto", fontSize:10.5, padding:"2px 9px", borderRadius:20, background:RL.greenPale, color:RL.greenDark, fontWeight:500 }}>{sel.length} sel.</span>}
            </div>
            {sesion.docs.map(doc=><Card key={doc.id} doc={doc} sel={sel.includes(doc.id)} onToggle={()=>toggle(doc.id)} expanded={!!expandidos[doc.id]} onExpand={()=>toggleExp(doc.id)} resumenContextual={sesion.resumenes?.[doc.id]} />)}
          </div>
        ) : (
          <div style={{ padding:"10px 12px", background:"#f3f4f6", borderRadius:10, fontSize:12.5, color:"#6b7280", marginBottom:12, lineHeight:1.6 }}>
            No encontré documentos internos directamente relacionados con este caso.
          </div>
        )}

        <BusquedaWeb pregunta={sesion.pregunta} onDocsChange={setDocsWeb} />
        <ChatRefinamiento sesion={sesion} docsWeb={docsWeb} />

        {sesion.docs.length>0 && (
          <div style={{ borderTop:"0.5px solid #e5e7eb", paddingTop:12, marginBottom:14 }}>
            <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:9 }}>
              <div style={{ width:3, height:12, background:RL.blue, borderRadius:2 }}></div>
              <span style={{ fontSize:12, fontWeight:600 }}>Análisis con IA</span>
              {sel.length===0&&<span style={{ fontSize:11, color:"#9ca3af" }}>— selecciona documentos arriba</span>}
            </div>
            <div style={{ display:"flex", gap:5, marginBottom:8 }}>
              {["analisis","resumen"].map(m=>(
                <button key={m} onClick={()=>setModo(m)} style={{ flex:1, fontSize:12, fontWeight:modo===m?600:400, background:modo===m?RL.greenPale:"transparent", color:modo===m?RL.greenDark:"#6b7280", border:`0.5px solid ${modo===m?RL.green:"#e5e7eb"}`, borderRadius:10, padding:"5px 0" }}>
                  {m==="analisis"?"Análisis profundo":"Resumen personalizado"}
                </button>
              ))}
            </div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:5, marginBottom:8 }}>
              {PLANTILLAS.map((p,i)=><button key={i} onClick={()=>setAnalisisTexto(p.texto)} style={{ fontSize:10.5, padding:"2px 9px", borderRadius:20, background:RL.bluePale, color:RL.blue, border:"none", fontWeight:500 }}>{p.label}</button>)}
            </div>
            <textarea value={analisisTexto} onChange={e=>setAnalisisTexto(e.target.value)} rows={2} placeholder="¿Qué quieres analizar?" style={{ width:"100%", fontSize:12.5, resize:"vertical", marginBottom:8, borderRadius:10 }} />
            <button onClick={ejecutarAnalisis} disabled={analisisLoading||sel.length===0||!analisisTexto.trim()}
              style={{ width:"100%", fontSize:13, fontWeight:600, background:sel.length>0&&analisisTexto.trim()?RL.blue:"#e5e7eb", color:sel.length>0&&analisisTexto.trim()?"#fff":"#9ca3af", border:"none", borderRadius:10, padding:"8px 0", opacity:analisisLoading?0.7:1, marginBottom:analisisResultado?10:0 }}>
              {analisisLoading?"Generando...":(modo==="analisis"?"Generar análisis →":"Generar resumen →")}
            </button>
            {analisisResultado && (
              <div ref={analisisRef}>
                <div style={{ display:"flex", justifyContent:"flex-end", gap:5, marginBottom:5 }}>
                  <button onClick={copiar} style={{ fontSize:11, padding:"2px 10px", borderRadius:20, background:copiado?RL.greenPale:"#f3f4f6", color:copiado?RL.greenDark:"#6b7280", border:"0.5px solid #e5e7eb", fontWeight:500 }}>{copiado?"✓ Copiado":"Copiar"}</button>
                  <button onClick={exportar} style={{ fontSize:11, padding:"2px 10px", borderRadius:20, background:RL.bluePale, color:RL.blue, border:"none", fontWeight:500 }}>Exportar .txt</button>
                </div>
                <div style={{ padding:"13px 15px", background:"#f3f4f6", borderRadius:10, fontSize:12.5, lineHeight:1.7, whiteSpace:"pre-wrap", borderLeft:`3px solid ${RL.green}` }}>
                  {analisisResultado}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── App principal ───────────────────────────────────────────────────────────
function App() {
  const [query, setQuery] = useState("");
  const [sesiones, setSesiones] = useState([]);
  const [buscando, setBuscando] = useState(false);
  const inputRef = useRef(null);

  async function buscar(q) {
    const pregunta=(q||query).trim();
    if(!pregunta||buscando) return;
    setBuscando(true); setQuery("");
    let docs=[], resumenes={}, resumenBusqueda="", respuestaDirecta="";
    try {
      const data = await callClaude({
        model:"claude-sonnet-4-6", max_tokens:900,
        messages:[{ role:"user", content:
`El usuario describe este caso: "${pregunta}"

Documentos disponibles en el repositorio Recylink:
${TODOS_DOCS.map(d=>`- id:${d.id} | ${d.titulo} | ${d.tipo} | ${d.resumen} | Temas: ${d.keywords.join(", ")}`).join("\n")}

Tareas:
1. Responde directamente al caso en 3-5 líneas desde el punto de vista normativo, usando solo estos documentos.
2. Selecciona SOLO los documentos que responden directamente al caso. Si ninguno aplica, ids vacío.
3. Para cada doc seleccionado, escribe 2-3 líneas de por qué aplica.
4. Escribe 2-3 líneas resumiendo qué encontraste.

Solo JSON sin backticks:
{"respuestaDirecta":"...","resumenBusqueda":"...","ids":["id1"],"resumenes":{"id1":"..."}}`
        }]
      });
      const txt=(data.content||[]).find(b=>b.type==="text")?.text||"{}";
      const p=JSON.parse(txt.replace(/```json|```/g,"").trim());
      docs=(p.ids||[]).map(id=>TODOS_DOCS.find(d=>d.id===id)).filter(Boolean);
      resumenes=p.resumenes||{}; resumenBusqueda=p.resumenBusqueda||""; respuestaDirecta=p.respuestaDirecta||"";
    } catch(e){ docs=[]; }
    setSesiones(prev=>[{id:Date.now(),pregunta,docs,resumenes,resumenBusqueda,respuestaDirecta},...prev]);
    setBuscando(false);
    setTimeout(()=>inputRef.current?.focus(),100);
  }

  return (
    <div>
      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"1.1rem", paddingBottom:"1rem", borderBottom:"0.5px solid #e5e7eb" }}>
        <div style={{ display:"flex", alignItems:"baseline" }}>
          <span style={{ fontSize:22, fontWeight:800, color:RL.green, letterSpacing:-0.5 }}>RECY</span>
          <span style={{ fontSize:22, fontWeight:800, color:RL.blue, letterSpacing:-0.5 }}>LINK</span>
          <span style={{ fontSize:11, color:RL.blue, marginLeft:1, verticalAlign:"super" }}>®</span>
        </div>
        <span style={{ fontSize:11.5, color:"#9ca3af" }}>Visor de Normativas · ClickUp + Drive + Internet</span>
      </div>

      {/* Buscador */}
      <div style={{ background:"#fff", border:"0.5px solid #e5e7eb", borderRadius:14, padding:"1rem", marginBottom:16 }}>
        <div style={{ position:"relative", marginBottom:9 }}>
          <span style={{ position:"absolute", left:11, top:"50%", transform:"translateY(-50%)", opacity:0.4, fontSize:15 }}>🔍</span>
          <input ref={inputRef} value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&buscar()}
            placeholder="Describe tu caso... Ej: cliente quiere recibir escombros sin autorización"
            style={{ paddingLeft:34 }} />
        </div>
        <p style={{ fontSize:11, color:"#9ca3af", margin:"0 0 6px", fontWeight:500 }}>Agrega contexto normativo:</p>
        <div style={{ display:"flex", flexWrap:"wrap", gap:5, marginBottom:9 }}>
          {GUIAS.map((g,i)=>{
            const activa=query.toLowerCase().includes(g.label.toLowerCase());
            return (
              <button key={i} onClick={()=>setQuery(q=>q?q+" | "+g.label:g.label)}
                style={{ fontSize:11, padding:"4px 10px", borderRadius:20, background:activa?RL.greenPale:"#f3f4f6", color:activa?RL.greenDark:"#6b7280", border:`0.5px solid ${activa?RL.green:"#e5e7eb"}`, display:"flex", alignItems:"center", gap:5, fontWeight:activa?500:400 }}>
                <span>{g.icono}</span><span>{g.label}</span>
              </button>
            );
          })}
        </div>
        <button onClick={()=>buscar()} disabled={buscando||!query.trim()}
          style={{ width:"100%", fontSize:13.5, fontWeight:600, background:buscando||!query.trim()?"#e5e7eb":RL.green, color:buscando||!query.trim()?"#9ca3af":"#fff", border:"none", borderRadius:10, padding:"9px 0", transition:"background 0.15s" }}>
          {buscando?"Analizando el caso...":"Buscar normativas →"}
        </button>
      </div>

      {sesiones.length===0 && (
        <div style={{ textAlign:"center", padding:"2.5rem 1rem", color:"#9ca3af" }}>
          <div style={{ fontSize:28, marginBottom:8 }}>🔍</div>
          <p style={{ margin:0, fontSize:13.5, fontWeight:500, color:"#6b7280" }}>Describe un caso para comenzar</p>
          <p style={{ margin:"4px 0 0", fontSize:12 }}>Cada consulta aparece como sección separada.</p>
        </div>
      )}

      {sesiones.map(s=><SesionBusqueda key={s.id} sesion={s} />)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
